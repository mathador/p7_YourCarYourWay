spring.application.name=payment-service
server.port=8084

# Charge la config depuis le Config Server (optionnel en local)
spring.config.import=optional:configserver:http://localhost:15000
spring.cloud.config.enabled=true

# Enregistrement Eureka (service discovery)
spring.cloud.discovery.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Stripe Mock Settings
stripe.api.key=sk_test_mock_key
stripe.mock.enabled=true
