spring.application.name=ApiGateway
server.port=8080

spring.config.import=optional:configserver:http://localhost:15000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Routes dynamiques basées sur Eureka (en plus des routes statiques ci-dessous)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=chat-service
spring.cloud.gateway.routes[1].uri=lb://chat-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/chat/**

spring.cloud.gateway.routes[2].id=i18n-service
spring.cloud.gateway.routes[2].uri=lb://i18n-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/i18n/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**
