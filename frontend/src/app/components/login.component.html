<div class="login-container">
    <div class="login-card">
        <div class="logo-section">
            <h1 class="brand-title">Your Car Your Way</h1>
            <p class="subtitle">Chat Application</p>
        </div>

        <form (ngSubmit)="login()" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" class="form-input"
                    placeholder="Enter your username" [disabled]="loading()" />
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" class="form-input"
                    placeholder="Enter your password" [disabled]="loading()" />
            </div>

            @if (error()) {
            <div class="error-message">{{ error() }}</div>
            }

            <button type="submit" class="login-button" [disabled]="loading()">
                {{ loading() ? 'Connecting...' : 'Sign In' }}
            </button>
        </form>

        <div class="demo-section">
            <p class="demo-label">Demo Accounts:</p>
            <div class="demo-buttons">
                <button type="button" class="demo-btn agent-btn" (click)="demoLogin('agent')" [disabled]="loading()">
                    Agent Demo
                </button>
                <button type="button" class="demo-btn client-btn" (click)="demoLogin('client')" [disabled]="loading()">
                    Client Demo
                </button>
            </div>
        </div>
    </div>
</div>
