spring.application.name=user-service
server.port=8082

# Charge la config depuis le Config Server (optionnel en local)
spring.config.import=optional:configserver:http://localhost:15000
spring.cloud.config.enabled=true

# Enregistrement Eureka (service discovery)
spring.cloud.discovery.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# PostgreSQL (docker-compose)
# 5433:5432 pour éviter un conflit avec un Postgres local (souvent sur 5432)
spring.datasource.url=jdbc:postgresql://localhost:5433/ycyw_db
spring.datasource.username=ycyw_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Exécute schema.sql avant Hibernate (utile pour colonnes NOT NULL sur table existante)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never